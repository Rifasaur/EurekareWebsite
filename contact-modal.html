<div class="contact-modal-card">
    <form id="contactInquiryForm">
        
        <div class="contact-modal-header">
            <h2 class="contact-modal-title">Inquiry Form</h2>
            <p class="contact-modal-subtitle">Please fill out your system requirements below.</p>
        </div>

        <div class="contact-modal-body">
            <div class="contact-modal-columns">
                
                <div class="contact-modal-col">
                    <h3 class="form-section-heading"><i class="fa-solid fa-hospital-user"></i> Facility Information</h3>
                    
                    <div class="contact-us-field">
                        <label class="contact-us-label">Name of the Facility</label>
                        <input type="text" name="facility_name" class="contact-us-input" placeholder="Enter facility name" required>
                    </div>
                    
                    <div class="contact-us-field">
                        <label class="contact-us-label">Estimated # of Patient</label>
                        <input type="number" name="estimated_patients" min="0" class="contact-us-input" placeholder="e.g. 100">
                    </div>
                    
                    <div class="contact-us-field">
                        <label class="contact-us-label">Representative:</label>
                        <input type="text" name="representative_name" class="contact-us-input" placeholder="Full name" required>
                    </div>
                    
                    <div class="contact-us-field option-field">
                        <label class="contact-us-checkbox-label">
                            <input type="checkbox" name="facility_type" value="Private" class="contact-us-checkbox"> 
                            <span class="custom-checkbox-text">Private Facility</span>
                        </label>
                    </div>
                </div>

                <div class="contact-modal-col">
                    <h3 class="form-section-heading"><i class="fa-solid fa-id-card"></i> Administrative Details</h3>
                    
                    <div class="contact-us-field">
                        <label class="contact-us-label">Designation / Role</label>
                        <input type="text" name="designation" class="contact-us-input" placeholder="e.g. Medical Director, Admin">
                    </div>
                    
                    <div class="contact-us-field">
                        <label class="contact-us-label">Address:</label>
                        <input type="text" name="facility_location" class="contact-us-input" placeholder="Enter address">
                    </div>
                    
                    <div class="contact-us-field">
                        <label class="contact-us-label">Contact / Email Address:</label>
                        <input type="text" name="email_address" class="contact-us-input" placeholder="e.g. username@example.com" required>
                    </div>
                    
                    <div class="contact-us-field option-field">
                        <label class="contact-us-checkbox-label">
                            <input type="checkbox" name="facility_type_public" value="Yes" class="contact-us-checkbox"> 
                            <span class="custom-checkbox-text">Public Sector</span>
                        </label>
                    </div>
                </div>

            </div>

            <div class="contact-form-section-bottom">
                <h3 class="form-section-heading"><i class="fa-solid fa-clipboard-list"></i> System Requirements</h3>
                <div class="contact-us-textarea-group">
                    <label class="contact-us-textarea-label">What are the requirements you are looking for an EMR?</label>
                    <textarea name="emr_requirements" class="contact-us-textarea" placeholder="Describe your requirements here..."></textarea>
                </div>
            </div>

        </div>

        <div class="contact-us-actions">
            <button type="button" class="contact-us-btn-back" onclick="closeContactUsModal()">
                <i class="fa-solid fa-chevron-left"></i> Back
            </button>
            <button type="submit" class="contact-us-btn-submit">
                Submit Inquiry <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>

    </form>
</div>
