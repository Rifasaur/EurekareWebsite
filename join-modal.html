<div class="contact-modal-card join-modal-card">
    <form id="joinTeamForm" enctype="multipart/form-data">
        <div class="contact-modal-header join-modal-header">
            <h2 class="contact-modal-title">Application Form</h2>
            <p class="contact-modal-subtitle">Join our team and help simplify healthcare delivery.</p>
        </div>

        <div class="contact-modal-body">
            <div class="contact-modal-columns">
                <div class="contact-modal-col">
                    <h3 class="form-section-heading"><i class="fa-solid fa-user-tie"></i> Personal Details</h3>
                    
                    <div class="contact-us-field">
                        <label class="contact-us-label">Full Name</label>
                        <input type="text" name="applicant_name" class="contact-us-input" placeholder="Enter your full name" required>
                    </div>
                    
                    <div class="contact-us-field">
                        <label class="contact-us-label">Email Address</label>
                        <input type="email" name="applicant_email" class="contact-us-input" placeholder="username@example.com" required>
                    </div>
                    
                    <div class="contact-us-field">
                        <label class="contact-us-label">Contact Number</label>
                        <input type="number" name="applicant_phone" class="contact-us-input" placeholder="e.g. 09171234567" required>
                    </div>
                </div>

                <div class="contact-modal-col">
                    <h3 class="form-section-heading"><i class="fa-solid fa-briefcase"></i> Position Information</h3>
                    
                    <div class="contact-us-field">
                        <label class="contact-us-label">Applying for Position:</label>
                        <input type="text" name="position" class="contact-us-input" placeholder="e.g. IT Intern, Support Staff" required>
                    </div>

                    <div class="contact-us-field">
                        <label class="contact-us-label">Resume / CV <span style="color: #718096; font-size: 0.85rem; font-weight: normal;">(Optional)</span></label>
                        <div class="join-file-upload-wrapper">
                            <input type="file" id="joinResumeInput" name="resume" class="join-file-input" accept=".pdf,.doc,.docx">
                            <label for="joinResumeInput" class="join-file-label" id="fileUploadLabel">
                                <i class="fa-solid fa-cloud-arrow-up"></i>
                                <span id="fileUploadText">Choose a file (PDF, DOCX) <span style="color: #718096; font-size: 0.85rem;">(Optional)</span></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="contact-form-section-bottom">
                <h3 class="form-section-heading"><i class="fa-solid fa-pen-to-square"></i> Message / Cover Letter</h3>
                <div class="contact-us-textarea-group">
                    <label class="contact-us-textarea-label">Introduce yourself or leave a brief message for our HR team</label>
                    <textarea name="cover_letter" class="contact-us-textarea" placeholder="Write your message here..."></textarea>
                </div>
            </div>
        </div>

        <div class="contact-us-actions">
            <button type="button" class="contact-us-btn-back" onclick="closeJoinModal()">
                <i class="fa-solid fa-chevron-left"></i> Back
            </button>
            <button type="submit" class="contact-us-btn-submit join-btn-submit">
                Submit Application <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </form>
</div>
