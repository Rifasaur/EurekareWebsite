<div class="contact-us-modal">
        <div class="contact-us-fieldset">
            <legend class="contact-us-legend">Forms</legend>

            <!-- Row 1 -->
            <div class="contact-us-row">
                <div class="contact-us-field">
                    <label class="contact-us-label">Name of the Facility</label>
                    <input type="text" class="contact-us-input" placeholder="Enter facility name">
                </div>
                <div class="contact-us-field">
                    <label class="contact-us-label">Estimated # of Patient</label>
                    <input type="text" class="contact-us-input" placeholder="e.g. 100">
                </div>
                <div class="contact-us-field">
                    <label class="contact-us-label">Representative:</label>
                    <input type="text" class="contact-us-input" placeholder="Full name">
                </div>
                <div class="contact-us-checkbox-group">
                    <label class="contact-us-checkbox-label">
                        <input type="checkbox" class="contact-us-checkbox"> Private
                    </label>
                </div>
            </div>

            <!-- Row 2 -->
            <div class="contact-us-row">
                <div class="contact-us-field">
                    <label class="contact-us-label">PAN (optional)</label>
                    <input type="text" class="contact-us-input" placeholder="PAN number">
                </div>
                <div class="contact-us-field">
                    <label class="contact-us-label">Address:</label>
                    <input type="text" class="contact-us-input" placeholder="Enter address">
                </div>
                <div class="contact-us-field">
                    <label class="contact-us-label">Contact #:</label>
                    <input type="text" class="contact-us-input" placeholder="e.g. 09171234567">
                </div>
                <div class="contact-us-checkbox-group">
                    <label class="contact-us-checkbox-label">
                        <input type="checkbox" class="contact-us-checkbox"> Public
                    </label>
                </div>
            </div>

            <!-- Textarea -->
            <div class="contact-us-textarea-group">
                <label class="contact-us-textarea-label">What are the requirements you are looking for an EMR?</label>
                <textarea class="contact-us-textarea" placeholder="Describe your requirements here..."></textarea>
            </div>

            <!-- Buttons -->
            <div class="contact-us-actions">
                <button class="contact-us-btn-back" onclick="closeContactUsModal()">&#10094; Back</button>
                <button class="contact-us-btn-submit">&#10094; Submit</button>
            </div>

        </div>
    </div>
