<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Updates | Eurekare Corporation</title>
    <link rel="stylesheet" href="stylesheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Standalone Article View Page Framework Styles */
        .article-view-page {
            padding-top: calc(var(--nav-height) + 40px);
            min-height: 100vh;
            background: linear-gradient(135deg, #f4f7f9 0%, #eef2f5 100%);
            padding-bottom: 80px;
        }
        .article-view-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .back-navigation {
            padding-top: 20px;
            margin-bottom: 25px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--eurekare-blue);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.2s ease;
        }
        .back-link:hover {
            transform: translateX(-4px);
        }
        .premium-article-card {
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(10, 29, 46, 0.06);
        }
        .article-main-banner {
            width: 100%;
            height: 450px;
            position: relative;
            background-color: var(--eurekare-dark);
        }
        .article-main-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .article-premium-body {
            padding: 50px 60px;
        }
        .article-meta-badge {
            background-color: rgba(67, 185, 183, 0.12);
            color: var(--eurekare-teal);
            text-transform: uppercase;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            padding: 6px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 25px;
        }
        .article-premium-body h1 {
            font-size: 2.8rem;
            color: var(--eurekare-dark);
            line-height: 1.2;
            margin: 0 0 30px 0;
            font-weight: 700;
        }
        .article-divider {
            height: 1px;
            background: #e2e8f0;
            margin-bottom: 35px;
        }
        .article-markup-content {
            font-size: 1.15rem;
            line-height: 1.85;
            color: #4a5568;
        }
        .article-markup-content p {
            margin-bottom: 25px;
        }
        @media (max-width: 768px) {
            .article-view-page { padding-top: calc(var(--nav-height) + 20px); }
            .article-main-banner { height: 280px; }
            .article-premium-body { padding: 30px 25px; }
            .article-premium-body h1 { font-size: 1.9rem; }
        }
    </style>
</head>
<body>

    <header id="header" class="header-placeholder"></header>

    <main class="article-view-page fade-in-page">
        <div class="article-view-container">
            
            <div class="back-navigation">
                <a href="index.html#blogs-news" class="back-link">
                    <i class="fas fa-arrow-left"></i> Back to Main Page
                </a>
            </div>

            <article class="premium-article-card">
                <div class="article-main-banner">
                    <img id="renderImage" src="images/AIC Burgundy Tower.jpg" alt="Featured Image">
                </div>
                <div class="article-premium-body">
                    <span class="article-meta-badge">Insights & Updates</span>
                    <h1 id="renderTitle">Loading Article...</h1>
                    <div class="article-divider"></div>
                    <div id="renderContent" class="article-markup-content">
                        </div>
                </div>
            </article>

        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Header components dynamic mapping injection
            fetch('nav.html')
                .then(response => response.text())
                .then(data => { document.getElementById('header').innerHTML = data; });

            // Core Article Data Dictionary Mapping Layout
            const articlesDB = {
                1: {
                    title: "Training Programs",
                    image: "images/Training_1.jpg",
                    content: "<p>Lorem ipsum dolor sit amet consectetur adipiscing elit. Quisque faucibus ex sapien vitae pellentesque sem placerat. In id cursus mi pretium tellus duis convallis. Tempus leo eu aenean sed diam urna tempor. Pulvinar vivamus fringilla lacus nec metus bibendum egestas. Iaculis massa nisl malesuada lacinia integer nunc posuere. Ut hendrerit semper vel class aptent taciti sociosqu. Ad litora torquent per conubia nostra inceptos himenaeos.</p> <p>Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.</p>"
                },
                2: {
                    title: "YAKAP Registration",
                    image: "images/Training_2.jpg",
                    content: "<p>Lorem ipsum dolor sit amet consectetur adipiscing elit. Quisque faucibus ex sapien vitae pellentesque sem placerat. In id cursus mi pretium tellus duis convallis. Tempus leo eu aenean sed diam urna tempor. Pulvinar vivamus fringilla lacus nec metus bibendum egestas. Iaculis massa nisl malesuada lacinia integer nunc posuere. Ut hendrerit semper vel class aptent taciti sociosqu. Ad litora torquent per conubia nostra inceptos himenaeos.</p> <p>Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.</p>"
                },
                3: {
                    title: "Patches",
                    image: "images/Training_3.jpg",
                    content: "<p>Lorem ipsum dolor sit amet consectetur adipiscing elit. Quisque faucibus ex sapien vitae pellentesque sem placerat. In id cursus mi pretium tellus duis convallis. Tempus leo eu aenean sed diam urna tempor. Pulvinar vivamus fringilla lacus nec metus bibendum egestas. Iaculis massa nisl malesuada lacinia integer nunc posuere. Ut hendrerit semper vel class aptent taciti sociosqu. Ad litora torquent per conubia nostra inceptos himenaeos.</p> <p>Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.</p>"
                }
            };

            // URL query parameters interpreter configuration
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id') || 1; // Default fallback to article index 1 if empty

            const article = articlesDB[id];
            if (article) {
                document.title = `${article.title} | Eurekare Corporation`;
                document.getElementById('renderTitle').textContent = article.title;
                document.getElementById('renderImage').src = article.image;
                document.getElementById('renderContent').innerHTML = article.content;
            } else {
                document.getElementById('renderTitle').textContent = "Article Not Found";
            }
        });
    </script>
</body>
</html>
